# Hetzner VPS — speaches (OpenAI-compatible Whisper server).
# Bind to Tailscale IP only; never expose to public internet.
#
# Bring up:  docker compose up -d
# Logs:      docker compose logs -f
# First transcription auto-downloads the model (large-v3 ~3GB).
services:
  speaches:
    image: ghcr.io/speaches-ai/speaches:latest-cpu
    container_name: speaches
    restart: unless-stopped
    # Listen on Tailscale interface only. Replace 100.x.y.z with this VPS's
    # `tailscale ip -4`. Falls back to 127.0.0.1 if you tunnel via SSH instead.
    ports:
      - "100.84.239.34:8000:8000"   # <-- EDIT to your VPS tailscale IP
    environment:
      # Keep the Polish model warm so each dictation skips cold-load.
      - WHISPER__TTL=-1
      # small int8 = best speed/Polish tradeoff on this ARM CPU (turbo was 12s
      # AND worse Polish; base is 1s but can't do Polish). Swap to -medium for
      # higher accuracy at ~2x the latency.
      - WHISPER__MODEL=Systran/faster-whisper-small
      # int8 (model ships float16 → was silently upcast to float32, ~10x
      # slower). int8 + all cores + batched VAD pipeline.
      - WHISPER__COMPUTE_TYPE=int8
      - WHISPER__CPU_THREADS=16
      - WHISPER__USE_BATCHED_MODE=true
    volumes:
      - hf-cache:/home/ubuntu/.cache/huggingface

volumes:
  hf-cache:
